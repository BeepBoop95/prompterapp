  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --text-dim: #666;
    --text-muted: #333;
    --radius: 10px;
    --font-mono: 'DM Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100dvh;
    overflow: hidden;
    overscroll-behavior: none;
  }

  /* ── LAYOUT ── */
  #app { display: flex; flex-direction: column; height: 100dvh; }

  /* ── TOPBAR ── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: calc(12px + env(safe-area-inset-top) + var(--ui-top-offset, 0px)) 16px 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--accent);
    margin-right: 4px;
    flex-shrink: 0;
  }

  .topbar-sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

  .top-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .top-btn:hover { border-color: var(--accent); color: var(--accent); }
  .top-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  .spacer { flex: 1; }

  /* ── MAIN AREA ── */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* ── CONTROL PANEL ── */
  #panel {
    width: 300px;
    min-width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
    max-height: 100%;
    transition: transform 0.3s ease, width 0.3s ease, min-width 0.3s ease;
    z-index: 5;
  }
  #panel.collapsed { width: 0; min-width: 0; border: none; overflow: hidden; }

  .panel-section {
    padding: 16px 20px 16px 16px;
    border-bottom: 1px solid var(--border);
  }
  .panel-section:last-child { border-bottom: none; }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 8px;
  }
  .control-row:last-child { margin-bottom: 0; }

  .ctrl-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 80px;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: transform 0.1s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

  .val-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    min-width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .toggle-row:last-child { margin-bottom: 0; }

  .toggle-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
  }

  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    left: 3px; top: 3px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked + .toggle-track { background: var(--accent); }
  .toggle input:checked + .toggle-track::after { transform: translateX(16px); background: #000; }

  /* color picker */
  .color-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .color-swatch {
    width: 22px; height: 22px;
    border-radius: 4px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: var(--accent); }

  /* ── EDITOR / PROMPTER AREA ── */
  #content-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  #editor-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 10px;
    overflow: hidden;
  }

  #editor-toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .edit-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  #script-editor {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-display);
    font-size: 16px;
    line-height: 1.7;
    padding: 20px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    overflow-y: auto;
  }
  #script-editor:focus { border-color: var(--accent); }
  #script-editor::placeholder { color: var(--text-muted); }

  /* ── SCRIPT LIBRARY ── */
  #script-library {
    display: none;
    flex-direction: column;
    gap: 8px;
    max-height: 40vh;
    overflow-y: auto;
    padding: 4px 0;
  }
  #script-library.open { display: flex; }

  .script-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .script-item:hover { border-color: var(--accent); }
  .script-item.active-script { border-color: var(--accent); background: rgba(232,255,71,0.06); }

  .script-item-info { flex: 1; min-width: 0; }
  .script-item-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .script-item-preview {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .script-item-date {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .script-delete-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 4px;
    flex-shrink: 0;
    transition: color 0.15s, background 0.15s;
  }
  .script-delete-btn:hover { color: #ff4444; background: rgba(255,68,68,0.1); }

  /* Save modal */
  #save-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
  }
  #save-modal.open { display: flex; }
  #save-modal-inner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    width: 90%;
    max-width: 340px;
  }
  #save-modal-inner h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 14px;
  }
  #save-name-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-display);
    font-size: 16px;
    padding: 10px 14px;
    outline: none;
    margin-bottom: 14px;
  }
  #save-name-input:focus { border-color: var(--accent); }
  #save-modal-btns {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .modal-btn {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .modal-btn-cancel { background: var(--surface2); color: var(--text-dim); }
  .modal-btn-cancel:hover { border-color: var(--text-dim); }
  .modal-btn-save { background: var(--accent); color: #000; border-color: var(--accent); }
  .modal-btn-save:hover { opacity: 0.9; }

  .autosave-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    transition: color 0.3s;
  }
  .autosave-badge.saved { color: var(--accent); }

  /* ── PROMPTER VIEW ── */
  #prompter-wrap {
    flex: 1;
    display: none;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  #prompter-wrap.active { display: flex; }

  #prompter-scroll {
    flex: 1;
    overflow: hidden;
    position: relative;
    cursor: grab;
  }

  #prompter-inner {
    position: absolute;
    inset: 0;
    overflow: hidden;
    display: flex;
    align-items: flex-start;
  }

  #prompter-text {
    width: 100%;
    padding: 60vh 0;
    transition: transform 0s linear;
    will-change: transform;
  }

  #prompter-text p {
    padding: 0;
    margin: 0;
    word-wrap: break-word;
  }

  /* focus line overlay */
  #focus-line {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }
  .focus-line-bar {
    height: 2px;
    background: var(--accent);
    opacity: 0.5;
  }
  .focus-line-gap { height: 80px; }

  /* fade top/bottom */
  #prompter-scroll::before,
  #prompter-scroll::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 25%;
    pointer-events: none;
    z-index: 3;
  }
  #prompter-scroll::before { top: 0; background: linear-gradient(to bottom, var(--prompter-bg, #000) 0%, transparent 100%); }
  #prompter-scroll::after { bottom: 0; background: linear-gradient(to top, var(--prompter-bg, #000) 0%, transparent 100%); }

  /* ── PLAYBAR ── */
  #playbar {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 12px calc(20px + env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom) + var(--ui-bot-offset, 0px)) calc(20px + env(safe-area-inset-left));
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }
  #playbar.active { display: flex; }

  #play-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.1s, opacity 0.2s;
  }
  #play-btn:hover { transform: scale(1.08); }
  #play-btn:active { transform: scale(0.95); }
  #play-btn svg { width: 20px; height: 20px; fill: #000; }

  #restart-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--text-dim);
    transition: border-color 0.15s, color 0.15s;
  }
  #restart-btn:hover { border-color: var(--accent); color: var(--accent); }
  #restart-btn svg { width: 16px; height: 16px; }

  .speed-live {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .speed-live span { color: var(--accent); font-weight: 500; }

  #speed-slider-live {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #speed-slider-live::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  #progress-bar {
    width: 100%;
    height: 2px;
    background: var(--border);
    position: absolute;
    bottom: 0; left: 0;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s linear;
  }

  /* ── COUNTDOWN OVERLAY ── */
  #countdown-overlay {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 30;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  #countdown-overlay.active { display: flex; }

  #countdown-ring-wrap {
    position: relative;
    width: 140px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #countdown-ring {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  #countdown-ring-progress {
    transition: stroke-dashoffset 1s linear;
  }
  #countdown-number {
    font-family: var(--font-display);
    font-size: 56px;
    font-weight: 800;
    color: var(--accent);
    z-index: 1;
    line-height: 1;
  }

  /* ── FULLSCREEN MODE ── */
  body.fullscreen #topbar { display: none; }
  body.fullscreen #panel { display: none; }
  body.fullscreen #playbar { background: rgba(0,0,0,0.7); }

  /* ── MOBILE RESPONSIVE ── */
  #panel-close-row { display: none !important; }
  @media (max-width: 640px) {
    #panel-close-row { display: flex !important; }
    #panel { 
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 100vw !important; min-width: 0 !important;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 20;
      /* Respect Dynamic Island + manual nudge */
      padding-top: calc(env(safe-area-inset-top) + var(--ui-top-offset, 0px));
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
    }
    #panel.mobile-open { transform: translateX(0); }
    #panel.collapsed { transform: translateX(-100%); }
    .logo { font-size: 16px; }
  }

  /* ── MODAL OVERLAY ── */
  #panel-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 15;
    backdrop-filter: blur(2px);
  }
  #panel-overlay.active { display: block; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div id="app">
  <!-- TOPBAR -->
  <div id="topbar">
    <button class="top-btn" id="settings-btn" onclick="togglePanel()">⚙ Settings</button>
    <div class="spacer"></div>
    <button class="top-btn" id="mode-btn" onclick="toggleMode()">▶ Teleprompter</button>
  </div>

  <div id="main">
    <!-- PANEL OVERLAY (mobile) -->
    <div id="panel-overlay" onclick="closePanelMobile()"></div>

    <!-- CONTROL PANEL -->
    <div id="panel">

      <!-- CLOSE BUTTON (mobile) -->
      <div class="panel-section" id="panel-close-row" style="display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:14px;font-weight:700;color:var(--text);">Settings</span>
        <button class="top-btn" onclick="closePanelMobile()" style="background:var(--accent);color:#000;border-color:var(--accent);">✕ Close</button>
      </div>
      <!-- SCROLL SPEED -->
      <div class="panel-section">
        <div class="section-label">Scroll Speed</div>
        <div class="control-row">
          <span class="ctrl-label">Speed</span>
          <input type="range" id="speed" min="0.1" max="10" step="0.05" value="1" oninput="updateSpeed()">
          <span class="val-badge" id="speed-val">2.0</span>
        </div>
      </div>

      <!-- COUNTDOWN -->
      <div class="panel-section">
        <div class="section-label">Countdown</div>
        <div class="control-row">
          <span class="ctrl-label">Delay</span>
          <input type="range" id="countdown-delay" min="0" max="10" step="1" value="3" oninput="updateCountdownVal()">
          <span class="val-badge" id="countdown-delay-val">3s</span>
        </div>
      </div>

      <!-- TYPOGRAPHY -->
      <div class="panel-section">
        <div class="section-label">Typography</div>
        <div class="control-row">
          <span class="ctrl-label">Font Size</span>
          <input type="range" id="font-size" min="18" max="120" step="1" value="52" oninput="updateDisplay()">
          <span class="val-badge" id="font-size-val">52px</span>
        </div>
        <div class="control-row">
          <span class="ctrl-label">Line Height</span>
          <input type="range" id="line-height" min="1.0" max="2.5" step="0.05" value="1.5" oninput="updateDisplay()">
          <span class="val-badge" id="line-height-val">1.5×</span>
        </div>
        <div class="control-row">
          <span class="ctrl-label">Weight</span>
          <input type="range" id="font-weight" min="1" max="3" step="1" value="2" oninput="updateDisplay()">
          <span class="val-badge" id="font-weight-val">600</span>
        </div>
      </div>

      <!-- LAYOUT -->
      <div class="panel-section">
        <div class="section-label">Layout</div>
        <div class="control-row">
          <span class="ctrl-label">Margins</span>
          <input type="range" id="margins" min="0" max="25" step="1" value="8" oninput="updateDisplay()">
          <span class="val-badge" id="margins-val">8%</span>
        </div>
        <div class="control-row">
          <span class="ctrl-label">Text Align</span>
          <input type="range" id="text-align" min="1" max="3" step="1" value="2" oninput="updateDisplay()">
          <span class="val-badge" id="text-align-val">CTR</span>
        </div>
      </div>

      <!-- COLORS -->
      <div class="panel-section">
        <div class="section-label">Text Color</div>
        <div class="color-row" id="text-colors">
          <div class="color-swatch selected" style="background:#ffffff" data-color="#ffffff" onclick="setTextColor(this)"></div>
          <div class="color-swatch" style="background:#e8ff47" data-color="#e8ff47" onclick="setTextColor(this)"></div>
          <div class="color-swatch" style="background:#ff6b35" data-color="#ff6b35" onclick="setTextColor(this)"></div>
          <div class="color-swatch" style="background:#7ee8a2" data-color="#7ee8a2" onclick="setTextColor(this)"></div>
          <div class="color-swatch" style="background:#80aaff" data-color="#80aaff" onclick="setTextColor(this)"></div>
        </div>
        <div class="section-label" style="margin-top:14px">Background</div>
        <div class="color-row" id="bg-colors">
          <div class="color-swatch selected" style="background:#000000" data-color="#000000" onclick="setBgColor(this)"></div>
          <div class="color-swatch" style="background:#0a0a0a" data-color="#0a0a0a" onclick="setBgColor(this)"></div>
          <div class="color-swatch" style="background:#1a1a1a" data-color="#1a1a1a" onclick="setBgColor(this)"></div>
          <div class="color-swatch" style="background:#0d1f2d" data-color="#0d1f2d" onclick="setBgColor(this)"></div>
          <div class="color-swatch" style="background:#ffffff;border:2px solid #333" data-color="#ffffff" onclick="setBgColor(this)"></div>
        </div>
      </div>

      <!-- TRANSFORMS -->
      <div class="panel-section">
        <div class="section-label">Mirror / Flip</div>
        <div class="toggle-row">
          <span class="toggle-label">Flip Horizontal</span>
          <label class="toggle">
            <input type="checkbox" id="flip-h" onchange="updateDisplay()">
            <span class="toggle-track"></span>
          </label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Flip Vertical</span>
          <label class="toggle">
            <input type="checkbox" id="flip-v" onchange="updateDisplay()">
            <span class="toggle-track"></span>
          </label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Show Focus Line</span>
          <label class="toggle">
            <input type="checkbox" id="focus-line-toggle" checked onchange="toggleFocusLine()">
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>

    </div><!-- end panel -->

    <!-- CONTENT AREA -->
    <div id="content-area">

      <!-- EDITOR -->
      <div id="editor-wrap">
        <div id="editor-toolbar">
          <span class="edit-label">Script</span>
          <span class="autosave-badge" id="autosave-badge"></span>
          <div class="spacer"></div>
          <button class="top-btn" onclick="toggleLibrary()">📁 Scripts</button>
          <button class="top-btn" onclick="openSaveModal()">💾 Save As</button>
          <button class="top-btn" onclick="newScript()">＋ New</button>
        </div>
        <div id="script-library"></div>
        <textarea id="script-editor" placeholder="Paste or type your script here…

Use blank lines to separate paragraphs. Your text will scroll smoothly in Teleprompter mode.

Hit ▶ Teleprompter in the top bar to begin."></textarea>
      </div>

      <!-- SAVE MODAL -->
      <div id="save-modal">
        <div id="save-modal-inner">
          <h3>Save Script</h3>
          <input type="text" id="save-name-input" placeholder="Script name…" maxlength="60">
          <div id="save-modal-btns">
            <button class="modal-btn modal-btn-cancel" onclick="closeSaveModal()">Cancel</button>
            <button class="modal-btn modal-btn-save" onclick="confirmSave()">Save</button>
          </div>
        </div>
      </div>

      <!-- PROMPTER -->
      <div id="prompter-wrap">
        <!-- COUNTDOWN OVERLAY -->
        <div id="countdown-overlay">

              <circle cx="60" cy="60" r="52" fill="none" stroke="var(--border)" stroke-width="4"/>
              <circle id="countdown-ring-progress" cx="60" cy="60" r="52" fill="none" stroke="var(--accent)" stroke-width="4"
                stroke-linecap="round" stroke-dasharray="326.73" stroke-dashoffset="0"
                transform="rotate(-90 60 60)"/>
            </svg>
            <span id="countdown-number">3</span>
          </div>
        </div>
        <div id="prompter-scroll">
          <div id="prompter-inner">
            <div id="prompter-text"></div>
          </div>
          <div id="focus-line">
            <div class="focus-line-bar"></div>
            <div class="focus-line-gap"></div>
            <div class="focus-line-bar"></div>
          </div>
        </div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
      </div>

    </div><!-- end content-area -->
  </div><!-- end main -->

  <!-- PLAYBAR -->
  <div id="playbar">
    <button id="restart-btn" onclick="restartScroll()" title="Restart">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 .49-5.51"></path>
      </svg>
    </button>
    <button id="play-btn" onclick="togglePlay()">
      <svg id="play-icon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    </button>
    <span class="speed-live">Speed <span id="speed-live-val">2.0</span></span>
    <input type="range" id="speed-slider-live" min="0.1" max="10" step="0.05" value="1" oninput="syncSpeedLive()">
  </div>

</div><!-- end app -->

<script>
// ── STATE ──
let isPlaying = false;
let scrollPos = 0;
let animFrame = null;
let lastTime = null;
let currentSpeed = 1;
let prompterBg = '#000000';
let prompterTextColor = '#ffffff';
let isPanelOpen = true;
let isMobile = window.innerWidth <= 640;

// ── INIT ──
let topOffset = 0;
let botOffset = 0;

window.addEventListener('load', () => {
  updateDisplay();
  updateSpeed();
  checkMobile();
  applyOffsets();
});

window.addEventListener('resize', () => {
  isMobile = window.innerWidth <= 640;
  checkMobile();
  applyOffsets();
});

window.addEventListener('orientationchange', () => {
  setTimeout(() => {
    isMobile = window.innerWidth <= 640;
    checkMobile();
    applyOffsets();
  }, 350);
});

// ── TOP / BOTTOM NUDGE ──
function nudgeTop(delta) {
  topOffset = Math.max(0, Math.min(100, topOffset + delta));
  document.getElementById('top-nudge-display').textContent = topOffset;
  applyOffsets();
}

function applyOffsets() {
  const root = document.documentElement;
  root.style.setProperty('--ui-top-offset', topOffset + 'px');
  root.style.setProperty('--ui-bot-offset', botOffset + 'px');
}

function checkMobile() {
  if (isMobile && isPanelOpen) {
    // On mobile, panel starts closed
    const panel = document.getElementById('panel');
    panel.classList.remove('mobile-open');
    isPanelOpen = false;
  }
}

// ── PANEL TOGGLE ──
function togglePanel() {
  const panel = document.getElementById('panel');
  const overlay = document.getElementById('panel-overlay');
  const btn = document.getElementById('settings-btn');

  if (isMobile) {
    if (panel.classList.contains('mobile-open')) {
      panel.classList.remove('mobile-open');
      overlay.classList.remove('active');
      isPanelOpen = false;
    } else {
      panel.classList.add('mobile-open');
      overlay.classList.add('active');
      isPanelOpen = true;
    }
  } else {
    if (panel.classList.contains('collapsed')) {
      panel.classList.remove('collapsed');
      isPanelOpen = true;
      btn.classList.remove('active');
    } else {
      panel.classList.add('collapsed');
      isPanelOpen = false;
      btn.classList.add('active');
    }
  }
}

function closePanelMobile() {
  const panel = document.getElementById('panel');
  const overlay = document.getElementById('panel-overlay');
  panel.classList.remove('mobile-open');
  overlay.classList.remove('active');
  isPanelOpen = false;
}

// ── MODE TOGGLE ──
let inPrompterMode = false;

function toggleMode() {
  inPrompterMode = !inPrompterMode;
  const btn = document.getElementById('mode-btn');
  const editorWrap = document.getElementById('editor-wrap');
  const prompterWrap = document.getElementById('prompter-wrap');
  const playbar = document.getElementById('playbar');

  if (inPrompterMode) {
    editorWrap.style.display = 'none';
    prompterWrap.classList.add('active');
    playbar.classList.add('active');
    btn.textContent = '✎ Edit Script';
    btn.classList.add('active');
    buildPrompterText();
    restartScroll();
  } else {
    editorWrap.style.display = 'flex';
    prompterWrap.classList.remove('active');
    playbar.classList.remove('active');
    btn.textContent = '▶ Teleprompter';
    btn.classList.remove('active');
    stopScroll();
  }
  if (isMobile) closePanelMobile();
}

// ── BUILD PROMPTER TEXT ──
function buildPrompterText() {
  const raw = document.getElementById('script-editor').value;
  const container = document.getElementById('prompter-text');
  const paragraphs = raw.split(/\n\n+/);

  container.innerHTML = '';
  paragraphs.forEach(para => {
    if (para.trim()) {
      const p = document.createElement('p');
      p.textContent = para.trim().replace(/\n/g, ' ');
      container.appendChild(p);
    }
  });

  updateDisplay();
}

// ── UPDATE DISPLAY ──
const weightMap = [400, 600, 800];
const alignMap = ['left', 'center', 'right'];
const alignLabel = ['L', 'CTR', 'R'];

function updateDisplay() {
  const fontSize = document.getElementById('font-size').value;
  const lineHeight = document.getElementById('line-height').value;
  const weightIdx = parseInt(document.getElementById('font-weight').value) - 1;
  const marginPct = document.getElementById('margins').value;
  const alignIdx = parseInt(document.getElementById('text-align').value) - 1;
  const flipH = document.getElementById('flip-h').checked;
  const flipV = document.getElementById('flip-v').checked;

  document.getElementById('font-size-val').textContent = fontSize + 'px';
  document.getElementById('line-height-val').textContent = parseFloat(lineHeight).toFixed(2) + '×';
  document.getElementById('font-weight-val').textContent = weightMap[weightIdx];
  document.getElementById('margins-val').textContent = marginPct + '%';
  document.getElementById('text-align-val').textContent = alignLabel[alignIdx];

  const text = document.getElementById('prompter-text');
  text.style.fontSize = fontSize + 'px';
  text.style.lineHeight = lineHeight;
  text.style.fontWeight = weightMap[weightIdx];
  text.style.paddingLeft = marginPct + '%';
  text.style.paddingRight = marginPct + '%';
  text.style.textAlign = alignMap[alignIdx];
  text.style.color = prompterTextColor;
  text.style.marginBottom = '12px';

  const scaleX = flipH ? -1 : 1;
  const scaleY = flipV ? -1 : 1;

  const inner = document.getElementById('prompter-inner');
  inner.style.transform = `scale(${scaleX}, ${scaleY})`;
  inner.style.transformOrigin = 'center center';
  inner.style.background = prompterBg;
  document.documentElement.style.setProperty('--prompter-bg', prompterBg);

  const wrap = document.getElementById('prompter-scroll');
  wrap.style.background = prompterBg;
}

// ── SPEED ──
function updateSpeed() {
  currentSpeed = parseFloat(document.getElementById('speed').value);
  document.getElementById('speed-val').textContent = currentSpeed.toFixed(1);
  document.getElementById('speed-slider-live').value = currentSpeed;
  document.getElementById('speed-live-val').textContent = currentSpeed.toFixed(1);
}

function syncSpeedLive() {
  currentSpeed = parseFloat(document.getElementById('speed-slider-live').value);
  document.getElementById('speed-val').textContent = currentSpeed.toFixed(1);
  document.getElementById('speed').value = currentSpeed;
  document.getElementById('speed-live-val').textContent = currentSpeed.toFixed(1);
}

// ── COUNTDOWN ──
let countdownTimer = null;
let countdownActive = false;

function updateCountdownVal() {
  const val = document.getElementById('countdown-delay').value;
  document.getElementById('countdown-delay-val').textContent = val + 's';
}

function startCountdown(callback) {
  const delay = parseInt(document.getElementById('countdown-delay').value) || 0;
  if (delay === 0) { callback(); return; }

  countdownActive = true;
  const overlay = document.getElementById('countdown-overlay');
  const numEl = document.getElementById('countdown-number');
  const ring = document.getElementById('countdown-ring-progress');
  const circumference = 326.73;

  overlay.classList.add('active');
  let remaining = delay;
  numEl.textContent = remaining;
  ring.style.transition = 'none';
  ring.style.strokeDashoffset = '0';

  // Force reflow then animate
  ring.getBoundingClientRect();
  ring.style.transition = 'stroke-dashoffset 1s linear';

  function tick() {
    if (!countdownActive) {
      overlay.classList.remove('active');
      return;
    }

    // Animate ring for this second
    const progress = (delay - remaining + 1) / delay;
    ring.style.strokeDashoffset = (circumference * progress).toString();

    remaining--;

    if (remaining < 0) {
      overlay.classList.remove('active');
      countdownActive = false;
      callback();
      return;
    }

    numEl.textContent = remaining === 0 ? 'GO' : remaining;
    countdownTimer = setTimeout(tick, 1000);
  }

  countdownTimer = setTimeout(tick, 1000);
}

function cancelCountdown() {
  countdownActive = false;
  clearTimeout(countdownTimer);
  document.getElementById('countdown-overlay').classList.remove('active');
}

// ── SCROLL ANIMATION ──
function togglePlay() {
  if (countdownActive) {
    cancelCountdown();
    setPlayIcon(false);
    return;
  }
  if (isPlaying) {
    stopScroll();
  } else {
    setPlayIcon(true);
    startCountdown(() => {
      startScroll();
    });
  }
}

function startScroll() {
  isPlaying = true;
  lastTime = null;
  setPlayIcon(true);
  animFrame = requestAnimationFrame(scrollStep);
}

function stopScroll() {
  isPlaying = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  cancelCountdown();
  setPlayIcon(false);
}

function restartScroll() {
  stopScroll();
  scrollPos = 0;
  applyScroll();
  updateProgress();
}

function scrollStep(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const delta = timestamp - lastTime;
  lastTime = timestamp;

  scrollPos += (currentSpeed * delta * 0.05);

  const text = document.getElementById('prompter-text');
  const inner = document.getElementById('prompter-inner');
  const maxScroll = text.offsetHeight - inner.offsetHeight + (inner.offsetHeight * 0.5);

  if (scrollPos >= maxScroll) {
    scrollPos = maxScroll;
    stopScroll();
    updateProgress();
    return;
  }

  applyScroll();
  updateProgress();
  animFrame = requestAnimationFrame(scrollStep);
}

function applyScroll() {
  const text = document.getElementById('prompter-text');
  text.style.transform = `translateY(${-scrollPos}px)`;
}

function updateProgress() {
  const text = document.getElementById('prompter-text');
  const inner = document.getElementById('prompter-inner');
  const maxScroll = text.offsetHeight - inner.offsetHeight + (inner.offsetHeight * 0.5);
  const pct = maxScroll > 0 ? Math.min(100, (scrollPos / maxScroll) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function setPlayIcon(playing) {
  const icon = document.getElementById('play-icon');
  if (playing) {
    icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  } else {
    icon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
  }
}

// ── FOCUS LINE ──
function toggleFocusLine() {
  const fl = document.getElementById('focus-line');
  fl.style.display = document.getElementById('focus-line-toggle').checked ? 'flex' : 'none';
}

// ── COLORS ──
function setTextColor(el) {
  document.querySelectorAll('#text-colors .color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  prompterTextColor = el.dataset.color;
  updateDisplay();
}

function setBgColor(el) {
  document.querySelectorAll('#bg-colors .color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  prompterBg = el.dataset.color;
  updateDisplay();
}

// ── FULLSCREEN ──
function toggleFullscreen() {
  const btn = document.getElementById('fullscreen-btn');
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen?.();
    document.body.classList.add('fullscreen');
    btn.textContent = '✕ Exit Full';
  } else {
    document.exitFullscreen?.();
    document.body.classList.remove('fullscreen');
    btn.textContent = '⤢ Full';
  }
}

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    document.body.classList.remove('fullscreen');
    document.getElementById('fullscreen-btn').textContent = '⤢ Full';
  }
});

// ── TOUCH: tap to play/pause, drag to scrub ──
(function() {
  const el = document.getElementById('prompter-scroll');
  let touchStartY = 0;
  let touchStartScrollPos = 0;
  let touchMoved = false;
  let isDragging = false;

  // Mouse events (desktop)
  el.addEventListener('mousedown', e => {
    if (isPlaying) return;
    isDragging = true;
    touchMoved = false;
    touchStartY = e.clientY;
    touchStartScrollPos = scrollPos;
    el.style.cursor = 'grabbing';
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const delta = touchStartY - e.clientY;
    if (Math.abs(delta) > 5) touchMoved = true;
    scrollPos = Math.max(0, touchStartScrollPos + delta);
    applyScroll();
    updateProgress();
  });

  window.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      el.style.cursor = '';
    }
  });

  // Touch events (mobile)
  el.addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
    touchStartScrollPos = scrollPos;
    touchMoved = false;
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    const delta = touchStartY - e.touches[0].clientY;
    if (Math.abs(delta) > 8) touchMoved = true;
    if (!isPlaying && touchMoved) {
      scrollPos = Math.max(0, touchStartScrollPos + delta);
      applyScroll();
      updateProgress();
    }
  }, { passive: true });

  el.addEventListener('touchend', () => {
    if (!touchMoved) togglePlay();
  });

  // Desktop click (only if not dragged)
  el.addEventListener('click', e => {
    if (!touchMoved && !isDragging) togglePlay();
  });
})();

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (!inPrompterMode) return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowUp') { currentSpeed = Math.max(0.1, parseFloat((currentSpeed - 0.1).toFixed(2))); syncLiveSpeed(); }
  if (e.code === 'ArrowDown') { currentSpeed = Math.min(10, parseFloat((currentSpeed + 0.1).toFixed(2))); syncLiveSpeed(); }
  if (e.code === 'KeyR') restartScroll();
});

function syncLiveSpeed() {
  document.getElementById('speed-slider-live').value = currentSpeed;
  document.getElementById('speed-live-val').textContent = currentSpeed.toFixed(1);
  document.getElementById('speed').value = currentSpeed;
  document.getElementById('speed-val').textContent = currentSpeed.toFixed(1);
}


// ── SCRIPT STORAGE ──
const AUTOSAVE_KEY = 'prompter_autosave';
const SCRIPTS_KEY = 'prompter_scripts';
let autosaveTimer = null;
let activeScriptId = null;

// Auto-save on typing
document.getElementById('script-editor').addEventListener('input', () => {
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(autosave, 500);
});

function autosave() {
  const text = document.getElementById('script-editor').value;
  try {
    localStorage.setItem(AUTOSAVE_KEY, text);
    // If editing a saved script, update it too
    if (activeScriptId) {
      const scripts = getScripts();
      const idx = scripts.findIndex(s => s.id === activeScriptId);
      if (idx !== -1) {
        scripts[idx].text = text;
        scripts[idx].updated = Date.now();
        saveScripts(scripts);
      }
    }
    flashAutosave();
  } catch(e) {}
}

function flashAutosave() {
  const badge = document.getElementById('autosave-badge');
  badge.textContent = 'saved';
  badge.classList.add('saved');
  setTimeout(() => {
    badge.classList.remove('saved');
    setTimeout(() => { badge.textContent = ''; }, 300);
  }, 1200);
}

function loadAutosave() {
  try {
    const text = localStorage.getItem(AUTOSAVE_KEY);
    if (text) {
      document.getElementById('script-editor').value = text;
    }
  } catch(e) {}
}

// Script library
function getScripts() {
  try {
    return JSON.parse(localStorage.getItem(SCRIPTS_KEY) || '[]');
  } catch(e) { return []; }
}

function saveScripts(scripts) {
  try {
    localStorage.setItem(SCRIPTS_KEY, JSON.stringify(scripts));
  } catch(e) {}
}

function toggleLibrary() {
  const lib = document.getElementById('script-library');
  if (lib.classList.contains('open')) {
    lib.classList.remove('open');
  } else {
    renderLibrary();
    lib.classList.add('open');
  }
}

function renderLibrary() {
  const scripts = getScripts();
  const lib = document.getElementById('script-library');

  if (scripts.length === 0) {
    lib.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px;">No saved scripts yet.<br>Use <strong>Save As</strong> to save your first script.</div>';
    return;
  }

  // Sort newest first
  scripts.sort((a, b) => b.updated - a.updated);

  lib.innerHTML = scripts.map(s => {
    const preview = s.text.substring(0, 80).replace(/\n/g, ' ');
    const date = new Date(s.updated);
    const dateStr = (date.getMonth()+1) + '/' + date.getDate() + '/' + String(date.getFullYear()).slice(2);
    const isActive = s.id === activeScriptId ? ' active-script' : '';
    return '<div class="script-item' + isActive + '" onclick="loadScript(\'' + s.id + '\')">' +
      '<div class="script-item-info">' +
        '<div class="script-item-name">' + escapeHtml(s.name) + '</div>' +
        '<div class="script-item-preview">' + escapeHtml(preview) + '</div>' +
      '</div>' +
      '<span class="script-item-date">' + dateStr + '</span>' +
      '<button class="script-delete-btn" onclick="event.stopPropagation();deleteScript(\'' + s.id + '\')" title="Delete">✕</button>' +
    '</div>';
  }).join('');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function loadScript(id) {
  const scripts = getScripts();
  const script = scripts.find(s => s.id === id);
  if (script) {
    document.getElementById('script-editor').value = script.text;
    localStorage.setItem(AUTOSAVE_KEY, script.text);
    activeScriptId = id;
    renderLibrary();
    // Close library after loading
    document.getElementById('script-library').classList.remove('open');
    flashAutosave();
  }
}

function deleteScript(id) {
  if (!confirm('Delete this script?')) return;
  let scripts = getScripts();
  scripts = scripts.filter(s => s.id !== id);
  saveScripts(scripts);
  if (activeScriptId === id) activeScriptId = null;
  renderLibrary();
}

function newScript() {
  document.getElementById('script-editor').value = '';
  localStorage.setItem(AUTOSAVE_KEY, '');
  activeScriptId = null;
  document.getElementById('script-library').classList.remove('open');
}

// Save modal
function openSaveModal() {
  const modal = document.getElementById('save-modal');
  const input = document.getElementById('save-name-input');
  // Pre-fill with first line of text
  const text = document.getElementById('script-editor').value;
  const firstLine = text.split('\n')[0].trim().substring(0, 50);
  input.value = firstLine || '';
  modal.classList.add('open');
  setTimeout(() => input.focus(), 100);
}

function closeSaveModal() {
  document.getElementById('save-name-input').blur();
  document.getElementById('save-modal').classList.remove('open');
}

function confirmSave() {
  const name = document.getElementById('save-name-input').value.trim();
  if (!name) {
    document.getElementById('save-name-input').style.borderColor = '#ff4444';
    return;
  }
  const text = document.getElementById('script-editor').value;
  const scripts = getScripts();
  const id = 'script_' + Date.now();
  scripts.push({ id, name, text, updated: Date.now() });
  saveScripts(scripts);
  activeScriptId = id;
  closeSaveModal();
  flashAutosave();
}

// Enter key submits save modal
document.getElementById('save-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmSave();
});

// Close save modal on backdrop click
document.getElementById('save-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('save-modal')) closeSaveModal();
});

// Load autosave on init
loadAutosave();
</script>
